<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫畫文字飄浮空間 (GitHub 完美版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* 全域樣式：營造黑白漫畫感 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 20px 20px; /* 漫畫網點背景效果 */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
        }

        /* 飄浮文字的基礎樣式（漫畫對話框風格） */
        .floating-text {
            position: absolute;
            white-space: nowrap;
            background: white;
            color: black;
            border: 3px solid black;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 5px 5px 0px black; /* 漫畫風硬陰影 */
            border-radius: 10px;
            user-select: none;
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        /* 飄浮動畫效果 */
        @keyframes floatUp {
            0 {
                transform: translateY(100vh) rotate(var(--rot));
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* 載入中提示 */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            background: white;
            padding: 20px;
            border: 4px solid black;
            box-shadow: 8px 8px 0px black;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loader">正在召喚 CSV 漫畫文字...</div>
    <div id="container"></div>

    <script>
        // === 設定區 ===
        // 請在此處貼上您最新的「逗點分隔值 (.csv)」發布網址
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdrgkVAQ_gPthzrZSvdEQ3SnpKWdXjyTTJacMH-k5udPhBeFU4TsbXfD4p8Td0oZv9-CWu83fFGeE5/pub?output=csv'; 
        // =============

        // 啟動載入
        fetchCSV();

        function fetchCSV() {
            Papa.parse(csvUrl, {
                download: true,
                header: false, // 關閉 header，直接暴力掃描整張表
                skipEmptyLines: true,
                complete: function(results) {
                    document.getElementById('loader').style.display = 'none';
                    const rows = results.data;
                    const textList = [];
                    
                    // 黑名單：只要文字包含這些系統字、布林值，一律丟掉不顯示
                    const blacklist = ['null', 'true', 'false', 'undefined', 'content', '文字欄位'];

                    // 掃描 CSV 裡面的每一個格子
                    rows.forEach(row => {
                        row.forEach(cell => {
                            if (cell) {
                                const text = cell.trim();
                                
                                // 過濾條件：
                                // 1. 不能是空的
                                // 2. 不能是純數字 (例如隱藏的 ID)
                                // 3. 長度必須大於 1 個字
                                // 4. 不能在黑名單裡面
                                if (text && isNaN(text) && text.length > 1 && !blacklist.includes(text.toLowerCase())) {
                                    textList.push(text);
                                }
                            }
                        });
                    });
                    
                    if (textList.length === 0) {
                        alert("CSV 解析成功，但過濾後沒有留下任何有效文字，請確認試算表內有輸入文字！");
                        return;
                    }
                    
                    console.log("最終乾淨的文字庫:", textList);
                    startFloating(textList);
                },
                error: function(err) {
                    console.error("CSV 讀取失敗:", err);
                    document.getElementById('loader').innerText = "CSV 讀取失敗。";
                }
            });
        }

        function startFloating(texts) {
            const container = document.getElementById('container');
            
            setInterval(() => {
                const randomText = texts[Math.floor(Math.random() * texts.length)];
                
                const textNode = document.createElement('div');
                textNode.className = 'floating-text';
                textNode.innerText = randomText;
                
                const leftPos = Math.random() * 85; 
                const duration = 6 + Math.random() * 8; 
                const size = 16 + Math.random() * 16; 
                const rotation = (Math.random() * 30) - 15; 
                
                textNode.style.left = `${leftPos}%`;
                textNode.style.fontSize = `${size}px`;
                textNode.style.animationDuration = `${duration}s`;
                textNode.style.setProperty('--rot', `${rotation}deg`);
                
                container.appendChild(textNode);
                
                setTimeout(() => {
                    textNode.remove();
                }, duration * 1000);

            }, 700); 
        }
    </script>
</body>
</html>
