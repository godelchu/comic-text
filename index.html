<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫畫文字飄浮空間 (網頁版)</title>
    <style>
        /* 全域樣式：營造黑白漫畫感 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 20px 20px; /* 漫畫網點背景效果 */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
        }

        /* 飄浮文字的基礎樣式（漫畫對話框風格） */
        .floating-text {
            position: absolute;
            white-space: nowrap;
            background: white;
            color: black;
            border: 3px solid black;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 5px 5px 0px black; /* 漫畫風硬陰影 */
            border-radius: 10px;
            user-select: none;
            pointer-events: none; /* 讓滑鼠可以穿透 */
            
            /* 預設動畫：向上飄浮 */
            animation: floatUp linear infinite;
        }

        /* 飄浮動畫效果 */
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(var(--rot));
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* 載入中提示 */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            background: white;
            padding: 20px;
            border: 4px solid black;
            box-shadow: 8px 8px 0px black;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loader">正在讀取 Google 網頁資料...</div>
    <div id="container"></div>

    <script>
        // === 設定區 ===
        const originalUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdrgkVAQ_gPthzrZSvdEQ3SnpKWdXjyTTJacMH-k5udPhBeFU4TsbXfD4p8Td0oZv9-CWu83fFGeE5/pubhtml'; 
	// 使用剛剛成功打通的 corsproxy.io 橋樑
        const htmlUrl = 'https://corsproxy.io/?' + encodeURIComponent(originalUrl);

        // 啟動載入
        fetchGoogleHtml();

        function fetchGoogleHtml() {
            fetch(htmlUrl)
                .then(response => {
                    if (!response.ok) throw new Error('網路回應不成功');
                    return response.text();
                })
                .then(htmlText => {
                    document.getElementById('loader').style.display = 'none';

                    // 升級解析邏輯：直接用正規表達式抓取所有 <td>...</td> 裡面的文字
                    // 這樣不管 Google 格式怎麼變，都一定挖得出字
                    const regex = /<td[^>]*>([^<]+)<\/td>/g;
                    const textList = [];
                    let match;

                    while ((match = regex.exec(htmlText)) !== null) {
                        const text = match[1].trim();
                        // 過濾掉空值、純數字、試算表欄位英文字(如A, B, C)或不必要的系統字
                        if (text && text !== '​' && isNaN(text) && text.length > 1) {
                            textList.push(text);
                        }
                    }

                    // 備用機制：如果上面的 td 抓法還是空的，就把所有網頁裡的純文字都抓出來（防呆）
                    if (textList.length === 0) {
                        const cleanText = htmlText.replace(/<[^>]*>/g, ' '); // 濾掉所有 HTML 標籤
                        const words = cleanText.split(/[\s,]+/); // 用空格切開
                        words.forEach(w => {
                            const t = w.trim();
                            // 撈出長度大於1的非純數字文字（避免撈到一堆樣式代碼）
                            if(t && isNaN(t) && t.length > 1 && !t.includes('{') && !t.includes(';')) {
                                textList.push(t);
                            }
                        });
                    }

                    if (textList.length === 0) {
                        alert("連線成功，但防呆機制也找不到任何文字，請確認試算表內真的有輸入中文字喔！");
                        return;
                    }

                    console.log("成功解析出的文字庫:", textList);
                    
                    // 開始製造飄浮文字
                    startFloating(textList);
                })
                .catch(err => {
                    console.error("讀取網頁失敗:", err);
                    document.getElementById('loader').innerText = "讀取網頁失敗，請確認網路連線。";
                });
        }

        function startFloating(texts) {
            const container = document.getElementById('container');
            
            setInterval(() => {
                const randomText = texts[Math.floor(Math.random() * texts.length)];
                
                const textNode = document.createElement('div');
                textNode.className = 'floating-text';
                textNode.innerText = randomText;
                
                const leftPos = Math.random() * 85; 
                const duration = 6 + Math.random() * 8; 
                const size = 16 + Math.random() * 16; 
                const rotation = (Math.random() * 30) - 15; 
                
                textNode.style.left = `${leftPos}%`;
                textNode.style.fontSize = `${size}px`;
                textNode.style.animationDuration = `${duration}s`;
                textNode.style.setProperty('--rot', `${rotation}deg`);
                
                container.appendChild(textNode);
                
                setTimeout(() => {
                    textNode.remove();
                }, duration * 1000);

            }, 700); 
        }
    </script>
</body>
</html>
